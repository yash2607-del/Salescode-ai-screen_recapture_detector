<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dataset Slideshow for Screen Recapture Capture</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0f19;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #f3f4f6;
        }
        #slideshow-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .slide.active {
            opacity: 1;
        }
        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 2px solid #1f2937;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(17, 24, 39, 0.85);
            padding: 12px 24px;
            border-radius: 9999px;
            display: flex;
            gap: 15px;
            align-items: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }
        button {
            background: none;
            border: none;
            color: #f3f4f6;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #3b82f6;
        }
        #counter {
            font-size: 14px;
            color: #9ca3af;
            font-family: monospace;
        }
        #fullscreen-hint {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 24, 39, 0.7);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            color: #9ca3af;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="fullscreen-hint">Press F11 for Fullscreen | Space to Pause/Resume</div>
    <div id="slideshow-container"></div>
    
    <div id="controls">

        <button id="play-btn">Pause</button>

        <span id="counter">0 / 0</span>
    </div>

        let currentIndex = 0;
        let isPlaying = true;
        let slideInterval = null;
        const cycleTime = 3000; // 3 seconds per image
        
        const container = document.getElementById("slideshow-container");
        const counterEl = document.getElementById("counter");
        const playBtn = document.getElementById("play-btn");
        const nextBtn = document.getElementById("next-btn");
        const prevBtn = document.getElementById("prev-btn");
        
        // Initialize slides
        function init() {
            if (images.length === 0) {
                container.innerHTML = "<div class='slide active'><h2>No images found. Run download_real_dataset.py first.</h2></div>";
                counterEl.innerText = "0 / 0";
                return;
            }
            
            images.forEach((src, index) => {
                const slide = document.createElement("div");
                slide.className = "slide" + (index === 0 ? " active" : "");
                const img = document.createElement("img");
                img.src = src;
                img.alt = `Slide ${index + 1}`;
                slide.appendChild(img);
                container.appendChild(slide);
            });
            
            updateUI();
            startInterval();
        }
        
        function showSlide(index) {
            const slides = document.querySelectorAll(".slide");
            if (slides.length === 0) return;
            
            slides[currentIndex].classList.remove("active");
            
            // Wrap index around
            currentIndex = (index + slides.length) % slides.length;
            
            slides[currentIndex].classList.add("active");
            updateUI();
        }
        
        function updateUI() {
            counterEl.innerText = `${currentIndex + 1} / ${images.length}`;
        }
        
        function startInterval() {
            stopInterval();
            slideInterval = setInterval(() => {
                showSlide(currentIndex + 1);
            }, cycleTime);
        }
        
        function stopInterval() {
            if (slideInterval) {
                clearInterval(slideInterval);
                slideInterval = null;
            }
        }
        
        function togglePlay() {
            if (isPlaying) {
                stopInterval();
                playBtn.innerText = "Play";
                isPlaying = false;
            } else {
                startInterval();
                playBtn.innerText = "Pause";
                isPlaying = true;
            }
        }
        
        // Event Listeners
        playBtn.addEventListener("click", togglePlay);
        nextBtn.addEventListener("click", () => {
            showSlide(currentIndex + 1);
            if (isPlaying) startInterval(); // Reset timer
        });
        prevBtn.addEventListener("click", () => {
            showSlide(currentIndex - 1);
            if (isPlaying) startInterval(); // Reset timer
        });
        
        document.addEventListener("keydown", (e) => {
            if (e.code === "Space") {
                e.preventDefault();
                togglePlay();
            } else if (e.code === "ArrowRight") {
                showSlide(currentIndex + 1);
                if (isPlaying) startInterval();
            } else if (e.code === "ArrowLeft") {
                showSlide(currentIndex - 1);
                if (isPlaying) startInterval();
            }
        });
        
        init();
    </script>

</html>
